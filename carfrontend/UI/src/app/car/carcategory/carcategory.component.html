<div class="cards-container">
  <mat-card *ngFor="let car of carList" class="car-card">
    <mat-card-header>
      <mat-card-title>{{ car.carName }}</mat-card-title>
      <mat-card-subtitle>{{ car.brand }}</mat-card-subtitle>
    </mat-card-header>
    <img mat-card-image [src]="car.imageUrl" alt="Car Image">
    <mat-card-content>
      <p>Type: {{ car.carType }}</p>
      <p>Price: ₹{{ car.pricePerDay }}/day</p>
      <p>Fuel: {{ car.fuelType }}</p>
      <p>Seats: {{ car.seatingCapacity }}</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button color="primary" >Edit</button>
      <button mat-button color="warn" >Delete</button>
    </mat-card-actions>
  </mat-card>
</div>
