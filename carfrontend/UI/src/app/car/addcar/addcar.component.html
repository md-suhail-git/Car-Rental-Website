<div class="container-fluid pt-4 px-4">
    <div class="row g-4">
        <div class="col-sm-12 col-xl-6">
            <div class="bg-light rounded h-100 p-4">
                <h6 class="mb-4">Add New Car</h6>
                <form (ngSubmit)="addCar()">
                    <div class="mb-3">
                        <label class="form-label">Car Name</label>
                        <input type="text" class="form-control" [(ngModel)]="newCar.carName" name="carName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Car Type</label>
                        <input type="text" class="form-control" [(ngModel)]="newCar.carType" name="carType" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Brand</label>
                        <input type="text" class="form-control" [(ngModel)]="newCar.brand" name="brand" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Price Per Day</label>
                        <input type="number" class="form-control" [(ngModel)]="newCar.pricePerDay" name="pricePerDay"
                            required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fuel Type</label>
                        <input type="text" class="form-control" [(ngModel)]="newCar.fuelType" name="fuelType" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Seating Capacity</label>
                        <input type="number" class="form-control" [(ngModel)]="newCar.seatingCapacity"
                            name="seatingCapacity" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Image URL</label>
                        <input type="text" class="form-control" [(ngModel)]="newCar.imageUrl" name="imageUrl" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Add Car</button>
                </form>

            </div>
        </div>
    </div>
</div>
