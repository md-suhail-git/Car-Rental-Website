<div class="container-fluid pt-4 px-4">
    <div class="row g-4">
        <div class="col-sm-12 col-xl-6">
            <div class="bg-light rounded h-100 p-4">
                <h6 class="mb-4">Add New Customer</h6>
                <form (ngSubmit)="addCust()" #custForm="ngForm">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" [(ngModel)]="newCust.fullName" name="fullName" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" [(ngModel)]="newCust.email" name="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mobile No</label>
                        <input type="tel" class="form-control" [(ngModel)]="newCust.mobileNo" name="mobileNo" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" [(ngModel)]="newCust.address" name="address" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100" [disabled]="custForm.invalid">Add Customer</button>
                </form>
            </div>
        </div>
    </div>
</div>
